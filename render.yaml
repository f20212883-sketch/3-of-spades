services:
  - type: web
    name: three-of-spades-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://three-of-spades-backend.onrender.com/api
      - key: VITE_WS_URL
        value: wss://three-of-spades-backend.onrender.com/ws

  - type: web
    name: three-of-spades-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile